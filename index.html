<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff93bf" />
    <meta
      name="description"
      content="Ajedrez rosita en navegador con una IA desafiante y controles sencillos."
    />
    <title>Pink Mate | Chess vs Robot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro-panel">
        <p class="eyebrow">Chess vs Robot</p>
        <h1>Pink Mate</h1>
      </section>

      <section class="game-panel">
        <div class="topbar">
          <div class="status-card">
            <span>Turno</span>
            <strong id="turn-label">Blancas</strong>
          </div>
          <div class="status-card">
            <span>Estado</span>
            <strong id="status-label">Tu turno</strong>
          </div>
          <div class="status-card">
            <span>Dificultad</span>
            <strong id="difficulty-label">Imposible</strong>
          </div>
          <div class="status-card score-card">
            <span>Marcador</span>
            <strong id="score-label">Tú 0 · Máquina 0</strong>
          </div>
        </div>

        <div class="board-card">
          <div class="board-header">
            <div>
              <p class="mini-label">Tú juegas con</p>
              <h2>Blancas</h2>
            </div>
            <div class="controls-inline">
              <label class="select-wrap" for="difficulty-select">
                <span>Robot</span>
                <select id="difficulty-select">
                  <option value="4">Difícil</option>
                  <option value="5" selected>Imposible</option>
                </select>
              </label>
              <button id="reset-button" type="button">Nueva partida</button>
            </div>
          </div>

          <div class="board-layout">
            <div class="captured-card captured-top">
              <p class="mini-label">Capturadas por ti</p>
              <div class="captured-row" id="captured-black"></div>
            </div>

            <div class="board-wrap">
              <div class="coords coords-top" aria-hidden="true">
                <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
              </div>
              <div class="board-stage">
                <div class="board" id="board" aria-label="Tablero de ajedrez"></div>
                <div class="result-overlay hidden" id="result-overlay" aria-live="polite">
                  <div class="result-card">
                    <p class="result-text" id="result-text">HAS GANADO!</p>
                    <button id="result-reset-button" type="button">Nueva partida</button>
                  </div>
                </div>
              </div>
              <div class="coords coords-bottom" aria-hidden="true">
                <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
              </div>
            </div>

            <div class="captured-card captured-bottom">
              <p class="mini-label">Capturadas por el robot</p>
              <div class="captured-row" id="captured-white"></div>
            </div>
          </div>
        </div>

      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
